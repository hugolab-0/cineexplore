<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cine Explore</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="main-wrapper">

    <!-- NAVBAR -->

    <header class="navbar">

      <div class="logo">
        🎬 <span class="cine">CINE</span> EXPLORE
      </div>

      <nav>
        <a href="#" class="active">Início</a>
        <a href="#">Filme</a>
        <a href="#">Séries</a>
        <a href="#">Home</a>
      </nav>

      <div class="search-box">

        <span class="search-icon">🔍</span>

        <input 
          type="text" 
          placeholder="Filme ou série..."
        >

      </div>

    </header>

    <!-- HERO -->

    <section class="hero">

      <!-- LADO ESQUERDO -->

      <div class="hero-content">

        <p class="tagline">Destaque</p>

        <h1>The Boys</h1>

        <p class="description">
          The Boys explora um mundo que mostra o que acontece quando os super-heróis são tão populares como celebridades, influentes como políticos e respeitados como deuses.
        </p>

        <div class="buttons">

          <button class="btn-preto">
            Ver Agora
          </button>

          <button class="btn-branco">
            Mais info
          </button>

        </div>

      </div>

      <!-- IMAGEM -->

      <div class="hero-image-side">

        <img 
          src="#"
          alt="The Boys"
        >

      </div>

    </section>

  </body>
  </html>
