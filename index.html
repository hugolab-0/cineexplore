<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cine Explore</title>

  <!-- Folha de estilos principal -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Container principal que envolve toda a página -->
  <div id="main">

    <!-- ==================== NAVBAR ==================== -->

    <header class="barnav">

      <!-- Logo com imagem + texto do nome do site -->
      <div class="logo">
        <img src="./img/logo.png" alt=""> <span class="cine">CINE</span> EXPLORE
      </div>

      <!-- Menu de navegação principal -->
      <nav>
        <a href="#">Início</a>
        <a href="#">Filme</a>
        <a href="#">Séries</a>
        <a href="#">Home</a>
      </nav>

      <!-- Barra de pesquisa com ícone e input -->
      <div class="caixa-pesquisa">
        <span class="pesquisa-icon">🔍</span>
        <input type="text" placeholder="Filme ou série...">
      </div>

    </header>

    <!-- ==================== HERO ==================== -->

    <!-- Seção principal de destaque (banner) -->
    <section class="hero">

      <!-- Lado esquerdo do hero: texto e botões -->
      <div class="hero-esquerdo">

        <!-- Etiqueta/badge acima do título -->
        <p class="tagline">Destaque</p>

        <!-- Título do conteúdo em destaque -->
        <h1>The Boys</h1>

        <!-- Sinopse curta do conteúdo -->
        <p class="descricao">
          The Boys explora um mundo que mostra o que acontece quando os super-heróis são tão populares como celebridades, influentes como políticos e respeitados como deuses.
        </p>

        <!-- Botões de ação -->
        <div class="buttons">

          <!-- Botão principal: leva para assistir -->
          <button class="btn-preto">
            Ver Agora
          </button>

          <!-- Botão secundário: mais detalhes -->
          <button class="btn-branco">
            Mais info
          </button>

         
        </div>
      </div>


        <div class="imagem-central">
          <img src="./img/img_mario.png" alt="" class="img-fundo">
        </div>
    </section>

  </div> <!-- Fecha #main -->

  </body>
  </html>
